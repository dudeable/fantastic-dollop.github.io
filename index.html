<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Test</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="text-center py-4 shadow-sm">
        <h1>Circle Game</h1>
        <p>The timer starts when you click the first circle!</p>
    </header>

    <div class="container text-center mt-4">
        <div id="timer" class="display-4 mb-4">0s</div>
        <!-- This container must exist for circles to appear -->
        <div id="circle-container" class="d-flex justify-content-center flex-wrap mx-auto" style="max-width: 600px; min-height: 200px;">
        </div>

        <div id="leaderboard-section" class="mt-5 mx-auto" style="max-width: 400px;">
            <h3 class="mb-3">Fastest Times</h3>
            <ol id="leaderboard-list" class="list-group"></ol>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
